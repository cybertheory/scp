version: "3.8"
services:
  scp-python:
    build:
      context: .
      dockerfile: sdks/python/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./spec:/app/spec:ro
      - ./skills:/app/skills:ro
    command: ["uvicorn", "scp.server:app", "--host", "0.0.0.0", "--port", "8000"]
    # Example app is mounted and run instead when testing examples
  scp-typescript:
    build:
      context: .
      dockerfile: sdks/typescript/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./spec:/app/spec:ro
      - ./skills:/app/skills:ro
    environment:
      - NODE_ENV=production
    command: ["node", "dist/examples/ci-cd-server.js"]
